---
# cPanel Git Version Control deployment task.
#
# Dipakai untuk auto-deploy dari bare repo /home/tifx3722/repositories/absen_bayu
# ke direktori web yang dilayani Apache. Trigger:
#   * cPanel UI: "Manage" -> "Pull or Deploy" -> "Update from Remote" lalu
#     "Deploy HEAD Commit". Tab ini jalan kalau .cpanel.yml ada di root commit.
#   * SSH: cd ~/repositories/absen_bayu && git checkout-index ... lalu /usr/local/cpanel/bin/yml-deploy
#
# Sebelum deploy pertama, pastikan:
#   1. $DEPLOYPATH sudah dibuat: mkdir -p ~/public_html/absen
#   2. application/config/database.php tidak ditimpa creds dev kalau pakai
#      file lokal. Kalau pakai env vars (default config.php), set di
#      .htaccess / cPanel "Setup PHP" -> "Environment Variables":
#          ABSEN_DB_HOST=localhost
#          ABSEN_DB_USER=...
#          ABSEN_DB_PASS=...      (atau ABSEN_DB_PASSWORD=...)
#          ABSEN_DB_NAME=...
#   3. lib/vendor/autoload.php harus ada. Kalau Composer tersedia di hosting,
#      deploy akan coba composer install dari lib/. Kalau tidak tersedia,
#      upload lib/vendor dari mesin lokal setelah clone/deploy pertama.
#   4. Jalankan migrasi: mysql ... < database/add_early_leave_columns.sql
#
# Ubah DEPLOYPATH sesuai lokasi hosting. Default-nya subfolder domain
# tiffany.my.id/absen: ~/public_html/absen/.

deployment:
  tasks:
    - export DEPLOYPATH=/home/tifx3722/public_html/absen/
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/chmod 755 $DEPLOYPATH
    - /bin/cp -Rp application $DEPLOYPATH
    - /bin/cp -Rp assets $DEPLOYPATH
    - /bin/cp -Rp database $DEPLOYPATH
    - /bin/cp -Rp lib $DEPLOYPATH
    - /bin/cp -Rp system $DEPLOYPATH
    - if [ ! -f "${DEPLOYPATH}lib/vendor/autoload.php" ] && command -v composer >/dev/null 2>&1; then cd "${DEPLOYPATH}lib" && composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader; fi
    - if [ ! -f "${DEPLOYPATH}lib/vendor/autoload.php" ]; then echo "ERROR missing lib/vendor/autoload.php. Upload lib/vendor or run composer install in lib."; exit 1; fi
    - /bin/cp -p .htaccess $DEPLOYPATH
    - /bin/cp -p composer.json $DEPLOYPATH
    - /bin/cp -p index.php $DEPLOYPATH
    - /bin/cp -p readme.rst $DEPLOYPATH
    # Pastikan upload dirs writeable; cPanel default umumnya 755 yang OK
    # untuk apache shared-user, tapi explicit chmod aman.
    - /bin/chmod -R 775 ${DEPLOYPATH}assets/images/users
    - /bin/chmod -R 775 ${DEPLOYPATH}assets/images/cv
    - /bin/chmod -R 775 ${DEPLOYPATH}assets/file
    - /bin/chmod -R 775 ${DEPLOYPATH}assets/images/hr/leave
    - /bin/chmod -R 775 ${DEPLOYPATH}assets/images/hr/overtime
    # application/cache + application/logs di-skip dari git tapi harus ada
    # supaya CI tidak fatal.
    - /bin/mkdir -p ${DEPLOYPATH}application/cache ${DEPLOYPATH}application/logs ${DEPLOYPATH}uploads/attendance
    - /bin/chmod -R 775 ${DEPLOYPATH}application/cache ${DEPLOYPATH}application/logs ${DEPLOYPATH}uploads
